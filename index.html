<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basketball Scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div class="container">
    <div class="team-column">
      <h3 class="team-label">HOME</h3>
      <div class="score-display" id="home-label">0</div>
      <div class="button-group">
        <button type="button" class="score-btn home-score-btn" onclick="incrementHomeCountByOne()">+1</button>
        <button type="button" class="score-btn home-score-btn" onclick="incrementHomeCountByTwo()">+2</button>
        <button type="button" class="score-btn home-score-btn" onclick="incrementHomeCountByThree()">+3</button>
      </div>
    </div>
    <div class="team-column">
      <h3 class="team-label">GUEST</h3>
      <div class="score-display" id="guest-label">0</div>
      <div class="button-group">
        <button type="button" class="score-btn guest-score-btn" onclick="incrementGuestCountByOne()">+1</button>
        <button type="button" class="score-btn guest-score-btn" onclick="incrementGuestCountByTwo()">+2</button>
        <button type="button" class="score-btn guest-score-btn" onclick="incrementGuestCountByThree()">+3</button>
      </div>
    </div>
  </div>
  <script src="index.js"></script>
</body>

</html>
